services:
  postgres:
    image: postgres:16-alpine
    container_name: english-dictionary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_dictionary
    ports:
      - '5436:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d english_dictionary']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
